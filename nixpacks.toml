[phases.setup]
nixPkgs = ['python312', 'poetry']

[phases.install]
cmds = ['poetry config virtualenvs.create false', 'poetry install --no-dev --no-interaction --no-ansi', 'poetry cache clear . --all', 'find /usr/local -type d -name __pycache__ -exec rm -rf {} +', 'find /usr/local -type f -name "*.pyc" -delete']

[phases.build]
cmds = ['echo "Build complete"']

[start]
cmd = 'poetry run uvicorn main:app --host 0.0.0.0 --port $PORT'


